name: "\U0001F41B \u7F3A\u9677\u62A5\u544A / Bug Report"
description: "\u62A5\u544A cqlib \u7684\u529F\u80FD\u5F02\u5E38\u6216\u9519\u8BEF"
title: "[BUG] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        **感谢你报告 Bug！**

        提交前请确认：
        - 已搜索[现有 Issue](https://github.com/cq-lib/cqlib/issues)，避免重复提交
        - 安全漏洞请发送邮件至 <tianyan@chinatelecom.cn>（参考 [SECURITY.CN.md](SECURITY.CN.md)）

  - type: input
    id: version
    attributes:
      label: "cqlib \u7248\u672C"
      description: "\u8FD0\u884C `pip show cqlib` \u6216\u67E5\u770B `cargo.toml`"
      placeholder: "\u4F8B\u5982 0.1.0, commit a1b2c3d"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: "\u6D89\u53CA\u54EA\u4E2A\u7EC4\u4EF6\uFF1F"
      options:
        - "cqlib-core\uFF08Rust \u6838\u5FC3\u5E93\uFF09"
        - "binding-python\uFF08Python \u7ED1\u5B9A\uFF09"
        - "binding-c\uFF08C \u7ED1\u5B9A\uFF09"
        - "cqlib\uFF08Rust \u5BF9\u5916 crate\uFF09"
        - "\u5176\u4ED6 / \u4E0D\u786E\u5B9A"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: "\u8FD0\u884C\u73AF\u5883"
      description: "\u64CD\u4F5C\u7CFB\u7EDF\u3001CPU \u67B6\u6784\u3001Rust \u7248\u672C\u3001Python \u7248\u672C"
      placeholder: |
        - \u64CD\u4F5C\u7CFB\u7EDF\uFF1AUbuntu 22.04 / macOS 14 / Windows 11
        - CPU \u67B6\u6784\uFF1Ax86_64 / ARM64
        - Rust\uFF1A1.85.0
        - Python\uFF1A3.12.0
      render: markdown
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "\u590D\u73B0\u6B65\u9AA4"
      description: "\u63D0\u4F9B\u6700\u5C0F\u590D\u73B0\u4EE3\u7801"
      placeholder: |
        **Python\uFF1A**
        ```python
        from cqlib import Circuit
        qc = Circuit(2)
        qc.h(0)
        qc.cx(0, 1)
        # \u6B64\u5904\u51FA\u73B0 Bug
        ```

        **Rust\uFF1A**
        ```rust
        use cqlib_core::circuit::{Circuit, Qubit};
        let mut qc = Circuit::new(2);
        // \u6B64\u5904\u51FA\u73B0 Bug
        ```

        **C\uFF1A**
        ```c
        #include <cqlib/circuit.h>
        cqlib_circuit_t *qc = cqlib_circuit_new(2);
        // \u6B64\u5904\u51FA\u73B0 Bug
        ```
      render: markdown
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "\u671F\u671B\u884C\u4E3A"
      placeholder: "\u4F60\u671F\u671B\u53D1\u751F\u4EC0\u4E48\uFF1F"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: "\u5B9E\u9645\u884C\u4E3A"
      placeholder: "\u5B9E\u9645\u53D1\u751F\u4E86\u4EC0\u4E48\uFF1F\u8BF7\u9644\u4E0A\u5B8C\u6574\u7684\u9519\u8BEF\u4FE1\u606F\u3001\u65E5\u5FD7\u6216\u5806\u6808\u8DDF\u8E2A\u3002"
      render: text
    validations:
      required: true

  - type: textarea
    id: quantum_context
    attributes:
      label: "\u91CF\u5B50\u8BA1\u7B97\u76F8\u5173\u4E0A\u4E0B\u6587\uFF08\u5982\u9002\u7528\uFF09"
      description: "\u5982\u679C\u95EE\u9898\u6D89\u53CA\u6A21\u62DF\u3001\u566A\u58F0\u6216\u6570\u503C\u8BA1\u7B97\uFF0C\u8BF7\u8865\u5145\u4EE5\u4E0B\u4FE1\u606F"
      placeholder: |
        - \u8F93\u5165\u7EBF\u8DEF / \u91CF\u5B50\u95E8
        - \u4F7F\u7528\u7684\u53C2\u6570\uFF08theta\u3001\u968F\u673A\u79CD\u5B50\u7B49\uFF09
        - \u6A21\u62DF\u5668 / \u540E\u7AEF\u914D\u7F6E
        - \u566A\u58F0\u6A21\u578B\u53C2\u6570
        - \u9884\u671F\u4E0E\u5B9E\u9645\u8BEF\u5DEE\u8303\u56F4 / \u7CBE\u5EA6
      render: markdown
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: "\u8865\u5145\u4FE1\u606F"
      placeholder: "\u622A\u56FE\u3001\u76F8\u5173 Issue\u3001\u5C1D\u8BD5\u8FC7\u7684\u89E3\u51B3\u65B9\u6848\u7B49"
    validations:
      required: false
