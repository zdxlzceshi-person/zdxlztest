name: "\U0001F680 \u529F\u80FD\u5EFA\u8BAE / Feature Request"
description: "\u4E3A cqlib \u63D0\u51FA\u65B0\u529F\u80FD\u6216\u6539\u8FDB\u5EFA\u8BAE"
title: "[FEATURE] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        **感谢你提出功能建议！**

        提交前请确认：
        - 已搜索[现有 Issue](https://github.com/cq-lib/cqlib/issues)，确认未被提出过
        - 涉及重大 API 变更的建议，请先提 Issue 讨论方案（参考 [CONTRIBUTING.CN.md](CONTRIBUTING.CN.md)）

  - type: textarea
    id: problem
    attributes:
      label: "\u95EE\u9898\u63CF\u8FF0"
      description: "\u8FD9\u4E2A\u529F\u80FD\u89E3\u51B3\u4EC0\u4E48\u95EE\u9898\uFF1F\u63CF\u8FF0\u4F60\u7684\u4F7F\u7528\u573A\u666F\u3002"
      placeholder: "\u4F8B\u5982\uFF1A\u6211\u60F3\u7528 VQE \u6C42\u89E3\u81EA\u5B9A\u4E49\u54C8\u5BC6\u987F\u91CF\uFF0C\u4F46\u5F53\u524D API \u65E0\u6CD5\u76F4\u63A5\u4F20\u5165..."
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: "\u6D89\u53CA\u7684\u529F\u80FD\u6A21\u5757\uFF08\u53EF\u591A\u9009\uFF09"
      multiple: true
      options:
        - "\u91CF\u5B50\u7EBF\u8DEF\u6784\u5EFA\uFF08\u7EBF\u8DEF\u6784\u9020 / \u53C2\u6570\u5316\uFF09"
        - "\u4E2D\u95F4\u8868\u793A\uFF08IR / \u4F18\u5316\uFF09"
        - "\u7F16\u8BD1\u4F18\u5316\uFF08\u95E8\u5206\u89E3 / \u8DEF\u7531 / \u8C03\u5EA6\uFF09"
        - "\u8BBE\u5907\u6A21\u578B\uFF08\u6821\u51C6\u6570\u636E / \u62D3\u6251 / \u566A\u58F0\uFF09"
        - "\u91CF\u5B50\u6001\u6A21\u62DF\uFF08\u6001\u77E2\u91CF / \u566A\u58F0\u6A21\u578B\uFF09"
        - "\u8BEF\u5DEE\u7F13\u89E3\uFF08ZNE / Virtual Distillation\uFF09"
        - "\u53EF\u89C6\u5316\uFF08\u7EBF\u8DEF\u56FE / \u7ED3\u679C\u56FE\uFF09"
        - "Python \u7ED1\u5B9A"
        - "C \u7ED1\u5B9A"
        - "\u6587\u6863 / \u793A\u4F8B"
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: "\u65B9\u6848\u5EFA\u8BAE"
      description: "\u63CF\u8FF0\u4F60\u671F\u671B\u7684\u529F\u80FD\u3002\u6B22\u8FCE\u9644\u4E0A\u4EE3\u7801\u7247\u6BB5\u6216\u4F2A\u4EE3\u7801\u3002"
      placeholder: |
        ```python
        # \u671F\u671B\u7684 API \u793A\u4F8B
        from cqlib import Circuit, VQE

        qc = Circuit(4)
        ...
        result = VQE(qc, hamiltonian).run()
        ```
      render: markdown
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: "\u66FF\u4EE3\u65B9\u6848"
      description: "\u4F60\u5C1D\u8BD5\u8FC7\u54EA\u4E9B\u66FF\u4EE3\u65B9\u6848\uFF1F\u662F\u5426\u6709\u5176\u4ED6\u5E93\u5DF2\u7ECF\u5B9E\u73B0\u4E86\u7C7B\u4F3C\u529F\u80FD\uFF1F"
    validations:
      required: false

  - type: checkboxes
    id: scope
    attributes:
      label: "\u8303\u56F4\u786E\u8BA4"
      options:
        - label: "\u8BE5\u529F\u80FD\u5C5E\u4E8E cqlib \u7684\u9879\u76EE\u8303\u56F4\uFF08\u91CF\u5B50\u8BA1\u7B97 SDK\uFF1A\u7EBF\u8DEF\u3001IR\u3001\u7F16\u8BD1\u3001\u6A21\u62DF\u3001\u8BEF\u5DEE\u7F13\u89E3\uFF09"
          required: false
        - label: "\u6211\u613F\u610F\u4E3A\u8FD9\u4E2A\u529F\u80FD\u63D0\u4EA4 PR"
          required: false

  - type: textarea
    id: additional
    attributes:
      label: "\u8865\u5145\u4FE1\u606F"
      placeholder: "\u53C2\u8003\u6587\u732E\u3001\u8BBA\u6587\u3001\u5176\u4ED6\u6846\u67B6\u7684\u7C7B\u4F3C\u529F\u80FD\uFF08Qiskit\u3001Cirq\u3001PennyLane \u7B49\uFF09"
    validations:
      required: false
